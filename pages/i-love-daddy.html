<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>I love daddy</title>
<link rel="stylesheet" href="../style.css">
<link rel="icon" href="../favicon/favicon.svg" type="image/svg+xml">
</head>
<body>
<div class="top-bar">
  <div class="top-actions">
    <a href="../index.html" class="nav-button gallery-button">Gallery</a>
    <a href="../bio.html" class="nav-button bio-button">Bio</a>
    <a href="mailto:kilian.hoeppner@gmail.com?subject=greetings!" class="nav-button email-button">Email</a>
  </div>
  <div class="time">
    <div id="londonClock" class="clock" aria-label="London UTC analog clock">
      <span class="clock-hand hour-hand"></span>
      <span class="clock-hand minute-hand"></span>
      <span class="clock-hand second-hand"></span>
      <span class="clock-center"></span>
    </div>
  </div>
</div>

<main class="gallery-detail gallery-detail--ilove-daddy">
  <div class="gallery-detail__hero">
    <div class="gallery-detail__stage">
      <div class="gallery-detail__carousel" data-infinite-carousel aria-roledescription="carousel">
        <button type="button" class="gallery-detail__carousel-nav gallery-detail__carousel-nav--prev mobile-scroll-hint__btn" aria-label="Previous slide">
          <svg class="mobile-scroll-hint__icon gallery-detail__carousel-chevron gallery-detail__carousel-chevron--left" viewBox="0 0 24 24" width="48" height="48" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/>
          </svg>
        </button>
        <div class="gallery-detail__carousel-viewport">
          <div class="gallery-detail__carousel-track">
            <div class="gallery-detail__carousel-slide">
              <div class="gallery-detail__carousel-media">
                <img src="../files/i-love-daddy-1.png" alt="I love daddy — sticker on vinyl" class="ilovedaddy" width="1480" height="1193" decoding="async" fetchpriority="high">
              </div>
            </div>
            <div class="gallery-detail__carousel-slide gallery-detail__carousel-slide--ilove-daddy-applications">
              <div class="gallery-detail__carousel-media">
                <img src="../files/i-love-daddy-2.png" alt="Daddy Applications Now Open — sticker on vinyl" class="daddyapplications" width="732" height="476" decoding="async" loading="lazy">
              </div>
            </div>
            <div class="gallery-detail__carousel-slide gallery-detail__carousel-slide--ilove-daddy-dad">
              <div class="gallery-detail__carousel-media">
                <img src="../files/i-love-daddy-3.png" alt="I love daddy — reference photograph" class="ilove-daddy-dad" width="450" height="347" decoding="async" loading="lazy">
              </div>
            </div>
          </div>
        </div>
        <button type="button" class="gallery-detail__carousel-nav gallery-detail__carousel-nav--next mobile-scroll-hint__btn" aria-label="Next slide">
          <svg class="mobile-scroll-hint__icon gallery-detail__carousel-chevron gallery-detail__carousel-chevron--right" viewBox="0 0 24 24" width="48" height="48" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/>
          </svg>
        </button>
      </div>
    </div>
    <section class="profile-content gallery-detail__headline">
      <p>I love daddy, 2026, stickers printed on vinyl</p>
    </section>
  </div>
</main>
