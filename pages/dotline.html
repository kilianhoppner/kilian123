<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dotline</title>
<link rel="stylesheet" href="../style.css">
<link rel="icon" href="../favicon/favicon.svg" type="image/svg+xml">
</head>
<body>
<div class="top-bar">
  <div class="top-actions">
    <a href="../index.html" class="nav-button">Gallery</a>
    <a href="../bio.html" class="nav-button">Bio</a>
    <a href="mailto:kilian.hoeppner@gmail.com?subject=greetings!" class="nav-button">Email</a>
  </div>
  <div class="time">
    <div id="londonClock" class="clock" aria-label="London UTC analog clock">
      <span class="clock-hand hour-hand"></span>
      <span class="clock-hand minute-hand"></span>
      <span class="clock-hand second-hand"></span>
      <span class="clock-center"></span>
    </div>
  </div>
</div>

<main class="gallery-detail gallery-detail--dotline gallery-detail--typeface">
  <div class="gallery-detail__hero">
    <div class="gallery-detail__stage">
      <div class="gallery-detail__carousel" data-infinite-carousel aria-roledescription="carousel">
        <button type="button" class="gallery-detail__carousel-nav gallery-detail__carousel-nav--prev mobile-scroll-hint__btn" aria-label="Previous slide">
          <svg class="mobile-scroll-hint__icon gallery-detail__carousel-chevron gallery-detail__carousel-chevron--left" viewBox="0 0 24 24" width="48" height="48" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/>
          </svg>
        </button>
        <div class="gallery-detail__carousel-viewport">
          <div class="gallery-detail__carousel-track">
            <div class="gallery-detail__carousel-slide gallery-detail__carousel-slide--dotline-animation">
              <div class="gallery-detail__carousel-media">
                <img src="../files/dotline.svg" alt="Animated abstract geometric line artwork" class="a-symbol" decoding="async" loading="eager" data-dotline-sync>
              </div>
            </div>
            <div class="gallery-detail__carousel-slide gallery-detail__carousel-slide--dotline-grid">
              <div class="gallery-detail__carousel-media">
                <div class="dotline-grid-overlay">
                  <img src="../files/dotline-2.svg" alt="Dotline glyph grid specimen" class="dotline-grid-overlay__grid" decoding="async" loading="lazy">
                  <img src="../files/dotline.svg" alt="Animated abstract geometric line artwork over grid" class="dotline-grid-overlay__animation" decoding="async" loading="eager" data-dotline-sync>
                </div>
              </div>
            </div>
            <div class="gallery-detail__carousel-slide gallery-detail__carousel-slide--dotline-photo">
              <div class="gallery-detail__carousel-media">
                <img src="../files/dotline.png" alt="Dotline reference photograph of structural cables and concrete" decoding="async" loading="lazy">
              </div>
            </div>
          </div>
        </div>
        <button type="button" class="gallery-detail__carousel-nav gallery-detail__carousel-nav--next mobile-scroll-hint__btn" aria-label="Next slide">
          <svg class="mobile-scroll-hint__icon gallery-detail__carousel-chevron gallery-detail__carousel-chevron--right" viewBox="0 0 24 24" width="48" height="48" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/>
          </svg>
        </button>
      </div>
    </div>
    <section class="profile-content gallery-detail__headline">
      <p><em>Dotline</em>, 2026, geometric line study</p>
    </section>
  </div>
  <section class="profile-content gallery-detail__details">
    <p>Animated geometric line study.</p>
    <p class="section-heading">References</p>
    <div class="reference-list">
      <p>SPIN studio, <a href="https://spin.co.uk/projects/proa" class="hyperlink" rel="noopener noreferrer">Fundación Proa</a></p>
      <p>London's Screen Archives, <a href="https://www.londonsscreenarchives.org.uk/title/19773/" class="hyperlink" rel="noopener noreferrer">The Hammersmith Flyover, Hammersmith</a>, 1961</p>
    </div>
  </section>
</main>

<script src="../script.js"></script>
<script src="../carousel.js"></script>
<footer class="footer">Website developed by <a href="https://www.linkedin.com/in/kilian-h%C3%B6ppner-683737312/" class="hyperlink" rel="noopener noreferrer">Kilian Höppner</a>. Typeset in <a href="https://abcdinamo.com/typefaces/diatype" class="hyperlink" rel="noopener noreferrer">ABC Diatype</a>. Copyright © 2026. All rights reserved.</footer>
</body>
</html>
