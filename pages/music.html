<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Electronic Superhighway</title>
<link rel="stylesheet" href="../style.css">
<link rel="icon" href="../favicon/favicon.svg" type="image/svg+xml">
</head>
<body>
<div class="top-bar">
  <div class="top-actions">
    <a href="../index.html" class="nav-button gallery-button">Gallery</a>
    <a href="../bio.html" class="nav-button bio-button">Bio</a>
    <a href="mailto:kilian.hoeppner@gmail.com?subject=greetings!" class="nav-button email-button">Email</a>
  </div>
  <div class="time">
    <div id="londonClock" class="clock" aria-label="London UTC analog clock">
      <span class="clock-hand hour-hand"></span>
      <span class="clock-hand minute-hand"></span>
      <span class="clock-hand second-hand"></span>
      <span class="clock-center"></span>
    </div>
  </div>
</div>

<main class="gallery-detail">
  <div class="gallery-detail__hero">
    <div class="gallery-detail__stage">
    <div class="gallery-audio-slot">
      <audio preload="metadata" class="gallery-audio">
        <source src="../files/ELECTRONICSUPERHIGHWAY.mp3" type="audio/mpeg">
      </audio>
      <div
        class="gallery-audio-visual"
        tabindex="0"
        role="button"
        aria-label="Play audio"
      >
        <img
          class="gallery-audio-icon"
          src="../files/music.png"
          alt=""
          width="64"
          height="64"
          decoding="async"
        />
        <div class="gallery-audio-overlay" aria-hidden="true">
          <span class="gallery-audio-overlay-circle">
            <svg class="gallery-audio-overlay-play" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
              <path fill="currentColor" d="M8 5v14l11-7z"/>
            </svg>
            <svg class="gallery-audio-overlay-pause" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" hidden="">
              <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </span>
        </div>
      </div>
    </div>
  </div>
    <section class="profile-content gallery-detail__headline">
      <p><em>Electronic Superhighway</em>, 2026, MP3 created with Ableton Live</p>
    </section>
  </div>
  <section class="profile-content gallery-detail__details">
    <p class="section-heading">References</p>
    <p>—</p>
  </section>
</main>

<script src="../script.js"></script>

</html>
