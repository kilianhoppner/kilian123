<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gallery</title>
<link rel="dns-prefetch" href="https://kilianhoppner.github.io">
<link rel="preconnect" href="https://kilianhoppner.github.io" crossorigin>

</head>



<body>
<!-- Top bar -->
<div class="top-bar">
  <div class="top-bar__cluster">
  <div class="top-actions">
    <a href="index.html" class="nav-button">Gallery</a>
    <a href="bio.html" class="nav-button">Bio</a>
    <a href="mailto:kilian.hoeppner@gmail.com?subject=greetings!" class="nav-button">Email</a>
  </div>


  <!-- Right-aligned London time -->
  <div class="time">
    <div id="londonClock" class="clock" aria-label="London UTC analog clock">
      <span class="clock-hand hour-hand"></span>
      <span class="clock-hand minute-hand"></span>
      <span class="clock-hand second-hand"></span>
      <span class="clock-center"></span>
    </div>
  </div>
  </div>

  <div class="mobile-scroll-hint" hidden>
    <button type="button" class="mobile-scroll-hint__btn" aria-label="Scroll down">
      <svg class="mobile-scroll-hint__icon" viewBox="0 0 24 24" width="48" height="48" aria-hidden="true">
        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/>
      </svg>
    </button>
  </div>

</div>


<section class="gallery">
  <div class="gallery-iframe-slot gallery-head-3d gallery-iframe-slot--with-overlay" aria-label="Head 3D">
    <a href="pages/self-portrait.html" class="gallery-tile-overlay-link" aria-label="Open Head"></a>
    <model-viewer
      class="gallery-head-3d__viewer"
      src="files/self-portrait.glb"
      alt="3D model of a head"
      loading="lazy"
      auto-rotate
      rotation-per-second="22deg"
      interaction-prompt="none"
      shadow-intensity="0"
      exposure="1"
      camera-orbit="93deg 85deg auto"
    ></model-viewer>
  </div>
  <a href="pages/hes-a-machine-a-walking-dildo.html" class="gallery-item-link"><img src="files/hes-a-machine-a-walking-dildo-1.png" alt="tshirt" class="tshirt"></a>
  <a href="pages/daddys-girl.html" class="gallery-item-link"><img src="files/daddys-girl-1.png" alt="Daddy's Girl — DADDY'S GIRL on plywood" class="daddysgirl" width="2528" height="1700"></a>
  <div class="gallery-arrow-spin" aria-hidden="true">
    <a href="pages/life-cycles.html" class="gallery-item-link gallery-arrow-spin__link">
    <img
      class="gallery-arrow-spin__img"
      src="files/life-cycles.png"
      alt=""
      width="64"
      height="64"
      decoding="async"
    />
    </a>
  </div>
  <a href="pages/home-is-where-the-is.html#sketch" class="gallery-item-link"><img src="files/home-is-where-the-is-1.png" alt="sketchhouse" class="sketchhouse"></a>
  <div class="gallery-iframe-slot gallery-toiletroll-3d gallery-iframe-slot--with-overlay" aria-label="Up your ass">
    <a href="pages/up-your-ass.html" class="gallery-tile-overlay-link" aria-label="Open Up your ass"></a>
    <div class="gallery-toiletroll-3d__viewer" data-toiletroll-init></div>
  </div>
  <a href="pages/take-it-slow.html" class="gallery-item-link"><img src="files/take-it-slow-1.png" alt="Yellow circular sign: SLOW" class="take-it-slow" width="491" height="577" decoding="async"></a>
  <div class="gallery-video-slot gallery-video-slot--whitehorse" aria-label="White horse">
    <a href="pages/kim-jong-uns-white-horse.html" class="gallery-tile-overlay-link" aria-label="Open white horse"></a>
    <video
      class="gallery-video-slot__video"
      src="files/kim-jong-uns-white-horse.mp4"
      muted
      playsinline
      autoplay
      preload="auto"
    ></video>
    <video
      class="gallery-video-slot__video"
      src="files/kim-jong-uns-white-horse.mp4"
      muted
      playsinline
      preload="auto"
    ></video>
  </div>
  <a href="pages/i-love-daddy.html" class="gallery-item-link"><img src="files/i-love-daddy-1.png" alt="i love daddy" class="ilovedaddy" width="1480" height="1193"></a>
  <a href="pages/the-weather-room.html" class="gallery-item-link"><div class="gallery-weatherroom pdf" role="img" aria-label="Weather room"></div></a>
  <div class="gallery-iframe-slot gallery-iframe-slot--with-overlay face-track-slot" id="faceTrackSlot" aria-label="#Surveillancecore Pt.01">
    <a href="pages/surveillancecore.html" class="gallery-tile-overlay-link" aria-label="Open #Surveillancecore Pt.01"></a>
    <video class="face-track-video" playsinline muted aria-hidden="true"></video>
    <div class="face-track-outline" aria-hidden="true"></div>
  </div>
  <a href="pages/hump-bridge-sign.html" class="gallery-item-link"><img src="files/hump-bridge-sign-1.svg" alt="bridge" class="bridge"></a>
  <a href="pages/nonsense.html" class="gallery-item-link"><img src="files/nonsense-1.png" alt="typeface" class="typeface"></a>
  <div
    class="gallery-globe-wireframe gallery-globe-wireframe--with-overlay"
    role="img"
    aria-label="3D sphere with graticule lines rotating on a vertical axis"
  >
    <a href="pages/man-at-the-centre-of-earth.html" class="gallery-tile-overlay-link" aria-label="Open Sphere"></a>
    <div class="gallery-globe-wireframe__canvas" data-globe-sphere-three></div>
  </div>
  <a href="pages/men-are-from-mars-women-are-from-venus.html" class="gallery-item-link"
    ><img
      src="files/men-are-from-mars-women-are-from-venus.svg"
      alt="Men are from Mars, women are from Venus"
      class="menarefrommars"
      decoding="async"
  /></a>
  <a href="pages/trump-always-chickens-out-taco.html" class="gallery-item-link"><div class="gallery-midnight-tile" aria-label="Time cycling between 23:59:00 and 23:59:59">
    <time class="gallery-midnight-time" datetime="1970-01-01T23:59:00">23:59:00</time>
  </div></a>
  <div class="gallery-magazine-slot gallery-magazine-slot--with-overlay" data-tbi-magazine data-asset-base="files">
    <a href="pages/thebigissue.html" class="gallery-tile-overlay-link" aria-label="The Big Issue — magazine cover animation"></a>
    <div class="gallery-magazine-3d" aria-hidden="true">
      <div class="gallery-magazine-3d__book">
        <div class="gallery-magazine-3d__face gallery-magazine-3d__face--front"></div>
        <div class="gallery-magazine-3d__face gallery-magazine-3d__face--back"></div>
      </div>
    </div>
  </div>
</section>

<!-- Preload p5 sketch in background. No allow=camera so Permissions Policy blocks webcam here (no prompt on Gallery); surveillancecore.html iframe enables camera. -->
<div class="surveillance-sketch-preload" aria-hidden="true">
  <iframe src="https://kilianhoppner.github.io/surveillancecore-pt.1/" title="" loading="eager" fetchpriority="low" referrerpolicy="strict-origin-when-cross-origin"></iframe>
</div>
